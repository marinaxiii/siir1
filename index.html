<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şiir Köşesi</title>
    <style>
        /* CSS kodlarını buraya (style etiketleri arasına) ekliyoruz */
        body {
            background-color: #f4f7f6; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            width: 90%;
            padding: 20px 0;
        }

        /* İstediğin yumuşak köşeli şiir kartı */
        .siir-karti {
            background: #ffffff;
            padding: 40px;
            border-radius: 30px; /* Yumuşak köşeler */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            box-sizing: border-box;
        }

        .siir-baslik {
            font-size: 1.8rem;
            color: #333;
            margin-top: 0;
            font-style: italic;
        }

        .siir-metni {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #555;
        }

        /* İstediğin yumuşak köşeli ve orta büyüklükte görsel */
        .siir-gorsel {
            width: 100%; 
            max-width: 500px; /* Kartla aynı genişlikte */
            height: auto;
            border-radius: 30px; /* Görselin köşeleri de yumuşak */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Şiir Kartı -->
        <div class="siir-karti">
            <h1 class="siir-baslik">Gece ve Umut</h1>
            <p class="siir-metni">
                Yıldızlar dökülürken sessizce yere,<br>
                Bir fısıltı yükselir derinlerden.<br>
                Umut, görünmez bir el gibi uzanır,<br>
                Karanlığın içindeki en aydınlık yerden.
            </p>
        </div>

        <!-- Görsel Bölümü -->
        <img src="https://picsum.photos/500/350" alt="Şiir Görseli" class="siir-gorsel">
    </div>

</body>
</html>
